name: Release

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  create-release:
    if: github.event.pull_request.merged == true
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - uses: actions/checkout@v4

      - name: Read version from tauri.conf.json
        id: version
        run: |
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          echo "value=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create tag and release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.value }}"
          git tag "$TAG" || true
          git push origin "$TAG" || true
          gh release create "$TAG" \
            --title "Agent Playground Desktop $TAG" \
            --notes "See CHANGELOG for details." \
            --latest || echo "Release already exists"

  build:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target universal-apple-darwin'
          - platform: windows-latest
            args: ''
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          AGENT_PLAYGROUND_URL: ${{ secrets.AGENT_PLAYGROUND_URL }}
        with:
          tagName: ${{ needs.create-release.outputs.version }}
          releaseName: 'Agent Playground Desktop ${{ needs.create-release.outputs.version }}'
          releaseBody: 'See CHANGELOG for details.'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
