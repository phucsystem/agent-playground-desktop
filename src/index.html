<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Playground</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex; align-items: center; justify-content: center;
      height: 100vh; background: #fff; font-family: -apple-system, system-ui, sans-serif;
      color: #71717b;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #18181b; color: #71717b; }
    }
    .loader { text-align: center; }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid #e4e4e7; border-top-color: #2b7fff;
      border-radius: 50%; animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }
    @media (prefers-color-scheme: dark) {
      .spinner { border-color: #3f3f47; border-top-color: #2b7fff; }
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { font-size: 14px; }
  </style>
</head>
<body>
  <div class="loader">
    <div class="spinner"></div>
    <p>Connecting...</p>
  </div>
</body>
</html>
